<!DOCTYPE html>
<html>
<head>
    <title>IPL Score Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9a9e, #fad0c4, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 85%;
            max-width: 900px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #ff5733;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px #ffd6cc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 15px;
        }

        thead {
            background: linear-gradient(45deg, #ff512f, #dd2476);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: center;
        }

        tbody tr:nth-child(odd) {
            background-color: #fff4e6;
        }

        tbody tr:nth-child(even) {
            background-color: #ffe6f0;
        }

        tbody tr:hover {
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            color: white;
            transform: scale(1.02);
            transition: 0.3s;
        }

        td {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏏 IPL 2026 Score Table 🏏</h1>

    <table>
        <thead>
            <tr>
                <th>Position</th>
                <th>Team</th>
                <th>Matches</th>
                <th>Won</th>
                <th>Lost</th>
                <th>Points</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Chennai Super Kings (CSK)</td>
                <td>14</td>
                <td>10</td>
                <td>4</td>
                <td>20</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Mumbai Indians (MI)</td>
                <td>14</td>
                <td>9</td>
                <td>5</td>
                <td>18</td>
            </tr>

            <tr>
                <td>3</td>
                <td>Royal Challengers Bengaluru (RCB)</td>
                <td>14</td>
                <td>8</td>
                <td>6</td>
                <td>16</td>
            </tr>

            <tr>
                <td>4</td>
                <td>Kolkata Knight Riders (KKR)</td>
                <td>14</td>
                <td>7</td>
                <td>7</td>
                <td>14</td>
            </tr>

            <tr>
                <td>5</td>
                <td>Sunrisers Hyderabad (SRH)</td>
                <td>14</td>
                <td>6</td>
                <td>8</td>
                <td>12</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
