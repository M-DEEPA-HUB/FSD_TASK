<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6dd5ed, #2193b0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #2193b0;
            margin-bottom: 25px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #2193b0;
            outline: none;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: #2193b0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: #176d85;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>User Information Form</h2>

        <form>
            <label for="name">User Name:</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label for="age">Password:</label>
            <input type="number" id="age" placeholder="Enter your password">

            <button type="button" onclick="showMessage()">
                Submit
            </button>
        </form>
    </div>

    <script>
        function showMessage() {
            alert("Data was stored successfully!");
        }
    </script>

</body>
</html>
