<!DOCTYPE html>
<html>
<head>
    <title>My Attractive Web Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2, #ff6b6b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 450px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            color: white;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        button {
            background: #ffeb3b;
            color: #333;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            background: white;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌟 Welcome 🌟</h1>
        <p>
            Dream big, work hard, and never stop learning.
            Every small step you take today leads to a brighter future.
        </p>

        <button>Explore More</button>
    </div>

</body>
</html>
